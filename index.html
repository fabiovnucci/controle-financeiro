<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro - Motorista</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Controle Financeiro</h1>

  <div id="formulario">
    <input type="number" id="valor" placeholder="Valor (R$)">
    
    <select id="tipo">
      <option value="ganho">Ganho</option>
      <option value="gasto">Gasto</option>
    </select>
    
    <button onclick="adicionarTransacao()">Adicionar</button>
  </div>

  <h2>Transações</h2>
  <ul id="lista"></ul>

  <h3>Total Ganho: R$ <span id="totalGanho">0</span></h3>
  <h3>Total Gasto: R$ <span id="totalGasto">0</span></h3>
  <h2>Lucro: R$ <span id="lucro">0</span></h2>

  <footer class="main-footer">
    <p>Desenvolvido por <strong>Fabio VNucci</strong></p>
    <div class="footer-links">
        <a href="https://github.com/fabiovnucci/controle-financeiro" target="_blank">
            Ver código no GitHub
        </a>
    </div>
</footer>

  <script src="script.js"></script>
</body>
</html>
